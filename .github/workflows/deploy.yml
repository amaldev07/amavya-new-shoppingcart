name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: firebase-hosting-live
  cancel-in-progress: false

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check current live version
        id: live
        continue-on-error: true
        run: |
          current_hash="$(curl -fsSL https://amavya-shop.web.app/index.html | sha256sum | awk '{ print $1 }')"
          build_hash="$(sha256sum dist/shopping-kart/browser/index.html | awk '{ print $1 }')"

          if [ "$current_hash" = "$build_hash" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Firebase Hosting
        if: steps.live.outputs.changed != 'false'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_AMAVYA_SHOP }}
          projectId: amavya-shop
          channelId: live

      - name: Skip deploy
        if: steps.live.outputs.changed == 'false'
        run: echo "Built app matches the current live Firebase Hosting version; skipping deploy."
